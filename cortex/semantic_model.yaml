name: attrition_semantic_model
description: Employee attrition prediction data for Meridian Workforce Solutions
tables:
  - name: EMPLOYEE_CLEANSED
    base_table:
      database: ATTRITION_ML
      schema: SILVER
      table: EMPLOYEE_CLEANSED
    description: Employee records with attrition risk scores and HR annotations
    columns:
      - name: EMPLOYEE_ID
        description: Unique employee identifier
      - name: EMPLOYEE_NAME
        description: Employee full name
      - name: ROLE
        description: Job role - Pilot, ICU Nurse, Anesthesiologist, Flight Paramedic, Cardiologist, Data Engineer, Security Engineer
      - name: REGION
        description: Geographic region - Midwest, Northeast, Southeast, West, Central
      - name: TENURE_YEARS
        description: Years employed at the company
      - name: SALARY
        description: Annual salary in USD
      - name: PERFORMANCE_SCORE
        description: Performance rating 1-5, higher is better
      - name: MANAGER_RATING
        description: Manager effectiveness rating 1-5, higher is better
      - name: DAYS_SINCE_LAST_RAISE
        description: Number of days since last compensation increase
      - name: OVERTIME_HOURS_MONTHLY
        description: Average overtime hours per month
      - name: PROMOTIONS_LAST_3_YEARS
        description: Number of promotions in last 3 years
      - name: DAYS_SINCE_LAST_1ON1
        description: Days since last manager one-on-one meeting
      - name: PTO_DAYS_UNUSED
        description: Unused PTO days - high values may indicate disengagement
      - name: INTERNAL_TRANSFERS_REQUESTED
        description: Number of internal transfer requests submitted
      - name: EXIT_SURVEY_SENTIMENT
        description: Sentiment score from exit survey text, -1 negative to 1 positive
      - name: CHURN_RISK_SCORE
        description: Model predicted probability of attrition, 0 to 1
      - name: CHURNED
        description: Whether employee has left - Y yes N no

verified_queries:
  - name: high_risk_by_role
    question: "Which roles have the highest attrition risk?"
    sql: |
      SELECT ROLE,
             COUNT(*) AS TOTAL,
             SUM(CASE WHEN CHURN_RISK_SCORE > 0.5 THEN 1 ELSE 0 END) AS HIGH_RISK,
             ROUND(AVG(CHURN_RISK_SCORE), 3) AS AVG_RISK_SCORE
      FROM ATTRITION_ML.SILVER.EMPLOYEE_CLEANSED
      WHERE CHURN_RISK_SCORE IS NOT NULL
      GROUP BY ROLE
      ORDER BY AVG_RISK_SCORE DESC

  - name: high_risk_pilots
    question: "How many pilots are at high risk?"
    sql: |
      SELECT COUNT(*) AS HIGH_RISK_PILOTS
      FROM ATTRITION_ML.SILVER.EMPLOYEE_CLEANSED
      WHERE UPPER(ROLE) = 'PILOT'
        AND CHURN_RISK_SCORE > 0.5

  - name: region_risk
    question: "Which region has the most at-risk employees?"
    sql: |
      SELECT REGION,
             COUNT(*) AS AT_RISK_COUNT,
             ROUND(AVG(CHURN_RISK_SCORE), 3) AS AVG_RISK
      FROM ATTRITION_ML.SILVER.EMPLOYEE_CLEANSED
      WHERE CHURN_RISK_SCORE > 0.5
      GROUP BY REGION
      ORDER BY AT_RISK_COUNT DESC

  - name: icu_nurse_drivers
    question: "What factors drive attrition for ICU nurses?"
    sql: |
      SELECT
          ROUND(AVG(DAYS_SINCE_LAST_RAISE)) AS AVG_DAYS_SINCE_RAISE,
          ROUND(AVG(MANAGER_RATING), 1) AS AVG_MANAGER_RATING,
          ROUND(AVG(OVERTIME_HOURS_MONTHLY), 1) AS AVG_OVERTIME,
          ROUND(AVG(DAYS_SINCE_LAST_1ON1)) AS AVG_DAYS_SINCE_1ON1,
          ROUND(AVG(PTO_DAYS_UNUSED), 1) AS AVG_UNUSED_PTO
      FROM ATTRITION_ML.SILVER.EMPLOYEE_CLEANSED
      WHERE UPPER(ROLE) = 'ICU NURSE'
        AND CHURN_RISK_SCORE > 0.5

  - name: high_overtime_low_rating
    question: "Show employees with high overtime and low manager ratings"
    sql: |
      SELECT EMPLOYEE_NAME, ROLE, REGION,
             OVERTIME_HOURS_MONTHLY, MANAGER_RATING,
             ROUND(CHURN_RISK_SCORE, 3) AS CHURN_RISK_SCORE
      FROM ATTRITION_ML.SILVER.EMPLOYEE_CLEANSED
      WHERE OVERTIME_HOURS_MONTHLY > 20
        AND MANAGER_RATING < 3
      ORDER BY CHURN_RISK_SCORE DESC
      LIMIT 25
